<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonii & Ronnie // A Quiet Story</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-deep: #0a080d; 
            --glass-bg: rgba(20, 15, 20, 0.92);
            --rose-gold: #e0a1ad;
            --ruby-red: #9b1b30;
            --soft-pink: #ffb6c1;
            --text-main: #fff0f5;
            --text-dim: rgba(255, 240, 245, 0.6);
            --glow: rgba(224, 161, 173, 0.5);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Playfair Display', serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overscroll-behavior: none;
        }

        /* REALISTIC SCANNING HEART MONITOR */
        .ekg-wrapper {
            position: absolute;
            top: 50%; left: 0;
            width: 100%; 
            height: 180px;
            transform: translateY(-50%);
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .ekg-svg { width: 100%; height: 100%; }

        .ekg-path {
            stroke: var(--rose-gold);
            stroke-width: 3.5;
            fill: none;
            filter: drop-shadow(0 0 12px var(--rose-gold)) drop-shadow(0 0 4px var(--ruby-red));
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* The scanning mask that reveals the heartbeat spikes */
        .scan-mask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, 
                var(--bg-deep) 0%, 
                transparent 5%, 
                transparent 45%, 
                var(--bg-deep) 50%
            );
            background-size: 200% 100%;
            animation: monitorScan 4s linear infinite;
        }

        @keyframes monitorScan {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* FINAL SCENE & HEART BUTTON */
        .final-scene {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; opacity: 0;
            transition: opacity 3.5s ease-in-out;
            background-color: #000;
        }

        .final-scene img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.25) contrast(1.2);
        }

        .home-heart-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-home-btn {
            background: none;
            border: none;
            color: var(--soft-pink);
            font-size: 8.5rem;
            cursor: pointer;
            text-shadow: 0 0 50px var(--ruby-red), 0 0 20px var(--rose-gold);
            animation: heartBeatPulse 1.2s ease-in-out infinite;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 2s ease 1.5s;
        }

        @keyframes heartBeatPulse {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.18); }
            30% { transform: scale(1); }
            45% { transform: scale(1.12); }
        }

        /* INTERFACE & TYPOGRAPHY */
        #cover {
            position: absolute;
            z-index: 100;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a141f 0%, #050406 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s ease;
        }

        .book-title { font-family: 'Dancing Script', cursive; font-size: 5.5rem; color: var(--rose-gold); margin: 0; text-shadow: 0 0 30px var(--glow); line-height: 1; text-align: center; }
        .subtitle { font-family: 'Playfair Display', serif; font-style: italic; color: var(--text-dim); font-size: 1.2rem; margin-top: 10px; letter-spacing: 2px; }

        #selection-container, #book-container {
            display: none;
            position: relative;
            z-index: 60;
            width: 88%;
            max-width: 520px;
            background: var(--glass-bg);
            padding: 50px 35px;
            border-radius: 40px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(224, 161, 173, 0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        h2 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--rose-gold); margin-bottom: 25px; font-weight: normal; }
        p { font-size: 1.15rem; line-height: 1.8; color: var(--text-main); margin-bottom: 20px; font-weight: 300; }
        b { color: var(--soft-pink); font-weight: 700; text-shadow: 0 0 10px rgba(255, 182, 193, 0.4); }

        .route-btn, .open-btn {
            background: linear-gradient(135deg, rgba(155, 27, 48, 0.3), rgba(224, 161, 173, 0.15));
            border: 1px solid var(--rose-gold);
            color: var(--rose-gold);
            padding: 18px 45px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: 0.5s;
            margin-top: 20px;
        }

        .route-btn:hover, .open-btn:hover { background: var(--rose-gold); color: var(--bg-deep); box-shadow: 0 0 40px var(--glow); transform: translateY(-3px); }

        .nav-btns { margin-top: 35px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .nav-btn { background: transparent; border: 1px solid rgba(224, 161, 173, 0.3); color: var(--text-dim); padding: 12px 25px; border-radius: 30px; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .nav-btn:hover { border-color: var(--rose-gold); color: var(--rose-gold); background: rgba(224, 161, 173, 0.1); }
        .nav-btn--danger {
            border-color: rgba(240, 128, 128, 0.45);
            color: #e89898;
        }
        .nav-btn--danger:hover {
            border-color: #f08080;
            color: #ffd0d0;
            background: rgba(155, 27, 48, 0.22);
        }

        .page { display: none; flex-direction: column; animation: luxeSlide 1s ease forwards; opacity: 0; }
        .active-page { display: flex; }
        @keyframes luxeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #rainCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; opacity: 0; transition: opacity 2s ease; pointer-events: none; }

        .our-song-player {
            width: 100%;
            max-width: 400px;
            margin: 28px auto 12px;
            filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.35));
        }

        .our-song-player audio { display: none; }

        .our-song-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(224, 161, 173, 0.35);
        }

        .our-song-play {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--rose-gold);
            background: linear-gradient(135deg, rgba(155, 27, 48, 0.35), rgba(224, 161, 173, 0.12));
            color: var(--rose-gold);
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .our-song-play:hover {
            background: rgba(224, 161, 173, 0.25);
            transform: scale(1.05);
        }

        .our-song-bar-wrap { flex: 1; min-width: 0; text-align: left; }

        .our-song-seek {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(224, 161, 173, 0.2);
            border-radius: 3px;
            cursor: pointer;
        }

        .our-song-seek::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--rose-gold);
            box-shadow: 0 0 10px var(--glow);
            cursor: pointer;
        }

        .our-song-seek::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--rose-gold);
            border: none;
            box-shadow: 0 0 10px var(--glow);
            cursor: pointer;
        }

        .our-song-times {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .chapter-editor-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(5, 4, 6, 0.82);
            align-items: center;
            justify-content: center;
            padding: 16px;
            backdrop-filter: blur(8px);
        }
        .chapter-editor-modal.is-open { display: flex; }
        .chapter-editor-panel {
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            background: var(--glass-bg);
            border: 1px solid rgba(224, 161, 173, 0.3);
            border-radius: 24px;
            padding: 24px 22px;
            text-align: left;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
        }
        .chapter-editor-panel h3 {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--rose-gold);
            margin: 0 0 16px;
            font-weight: normal;
            text-align: center;
        }
        .chapter-editor-panel label {
            display: block;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin: 12px 0 6px;
        }
        .chapter-editor-panel input[type="text"],
        .chapter-editor-panel select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(224, 161, 173, 0.35);
            background: rgba(0,0,0,0.35);
            color: var(--text-main);
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .ce-para {
            width: 100%;
            min-height: 72px;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(224, 161, 173, 0.35);
            background: rgba(0,0,0,0.35);
            color: var(--text-main);
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            resize: vertical;
        }
        .chapter-editor-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .chapter-editor-actions button {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            border: 1px solid rgba(224, 161, 173, 0.45);
            background: transparent;
            color: var(--text-dim);
        }
        .chapter-editor-actions button.primary {
            background: linear-gradient(135deg, rgba(155, 27, 48, 0.35), rgba(224, 161, 173, 0.15));
            color: var(--rose-gold);
            border-color: var(--rose-gold);
        }
        .ce-err {
            color: #f08080;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            margin: 12px 0 0;
            min-height: 1.2em;
        }
        #ce-add-para {
            margin-top: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px dashed rgba(224, 161, 173, 0.4);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .book-title { font-size: 4rem; }
            #selection-container, #book-container { padding: 40px 20px; width: 92%; }
            h2 { font-size: 2.8rem; }
            .heart-home-btn { font-size: 6.5rem; }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, raindrops = [];
        let storyRoute = null;
        let ourSongTrueDuration = null;
        let ourSongPlayerInited = false;
        let ourSongSeekPointerDown = false;
        /** Set when chapters load — used for navigation &amp; route B bed music */
        let STORY_META = { nA: 0, nB: 0, ourSongPage: 0, firstB: 0, lastBText: 0 };
        /** Full story object (mutated when saving new chapters to Supabase) */
        let storyData = null;
        let supabaseClient = null;
        /** First N chapters per path are fixed story; delete only applies after this index (0-based: 6 = chapter 7). */
        const ORIGINAL_CHAPTERS_PER_ROUTE = 6;

        /*
         * SUPABASE (one-time setup)
         * 1. https://supabase.com → New project → wait until ready.
         * 2. SQL Editor → paste the whole supabase/schema.sql file → Run.
         * 3. Table Editor → story_editor_secret → set save_token to a long random string.
         * 4. Project Settings → API:
         *    - Copy "Project URL" → SUPABASE_URL below.
         *    - Copy the publishable key (sb_publishable_...) OR legacy "anon" JWT → SUPABASE_ANON_KEY.
         *    - Never put the secret key (sb_secret_...) in this file — only publishable/anon in the browser.
         * 5. Same save_token as in the DB → EDITOR_SAVE_TOKEN below.
         * 6. Serve over https or localhost. Last page (Our Song) → + Add chapter → Save & publish.
         */
        const SUPABASE_URL = 'https://pmayokvnwrdmuscqhjea.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_c4ss8hqcn8Kxk86MWKwI5Q_xhJti6ux';
        const EDITOR_SAVE_TOKEN = 'duhskabgfuyhsaghbeuybhaiusewbhfuija';

        function dbEditorEnabled() {
            return Boolean(SUPABASE_URL && SUPABASE_ANON_KEY && EDITOR_SAVE_TOKEN);
        }

        function getSupabase() {
            if (!dbEditorEnabled()) return null;
            if (!supabaseClient) {
                const lib = window.supabase;
                if (!lib || typeof lib.createClient !== 'function') return null;
                supabaseClient = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            return supabaseClient;
        }

        async function loadStoryFromSupabase() {
            const sb = getSupabase();
            if (!sb) return null;
            const { data, error } = await sb.from('story_content').select('content').eq('id', 1).maybeSingle();
            if (error) {
                console.warn(error);
                return null;
            }
            if (!data || data.content == null) return null;
            const c = data.content;
            if (typeof c === 'string') {
                try { return JSON.parse(c); } catch (e) { return null; }
            }
            return c;
        }

        function formatSaveError(e) {
            const raw = (e && e.message) ? e.message : String(e);
            const details = (e && e.details) ? String(e.details) : '';
            const combined = (raw + ' ' + details).trim();
            let msg = combined || raw;
            if (/unauthorized|wrong_save_token|no_editor_secret_row|P0001/i.test(msg))
                msg = 'Save token mismatch. In Supabase → SQL Editor, run the file supabase/sync_save_token_to_index.sql (or set story_editor_secret.save_token to exactly match EDITOR_SAVE_TOKEN in index.html). If it still fails, use Settings → API Keys → \"Legacy anon…\" JWT as SUPABASE_ANON_KEY instead of sb_publishable_.';
            return msg;
        }

        async function persistStoryToSupabase() {
            const sb = getSupabase();
            if (!sb) throw new Error('Supabase library not loaded');
            const { error } = await sb.rpc('save_chapters', {
                p_token: String(EDITOR_SAVE_TOKEN || '').trim(),
                p_json: storyData
            });
            if (error) throw error;
        }

        function navBtn(label, targetPage) {
            const b = document.createElement('button');
            b.className = 'nav-btn';
            b.type = 'button';
            b.textContent = label;
            b.addEventListener('click', () => nextPage(targetPage));
            return b;
        }

        function navFinish() {
            const b = document.createElement('button');
            b.className = 'nav-btn';
            b.type = 'button';
            b.textContent = 'Finish';
            b.addEventListener('click', showFinalScene);
            return b;
        }

        function navAddChapter(preferredRoute) {
            const b = document.createElement('button');
            b.className = 'nav-btn';
            b.type = 'button';
            b.textContent = '+ Add chapter';
            b.addEventListener('click', () => openChapterEditor(preferredRoute));
            return b;
        }

        function navDeleteChapter(pageNum, routeKey) {
            const b = document.createElement('button');
            b.className = 'nav-btn nav-btn--danger';
            b.type = 'button';
            b.textContent = 'Delete chapter';
            b.setAttribute('aria-label', 'Delete this chapter');
            b.addEventListener('click', () => deleteChapterAtPage(pageNum, routeKey));
            return b;
        }

        function buildBook(story) {
            const root = document.getElementById('book-pages-root');
            root.innerHTML = '';
            ourSongPlayerInited = false;

            const nA = story.routeA.length;
            const nB = story.routeB.length;
            const ourSongPage = nA + nB + 1;

            STORY_META = {
                nA, nB, ourSongPage,
                firstB: nA + 1,
                lastBText: nA + nB
            };

            let pageNum = 1;

            story.routeA.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'page';
                div.id = 'p' + pageNum;
                const h2 = document.createElement('h2');
                h2.textContent = ch.title;
                div.appendChild(h2);
                ch.paragraphs.forEach(html => {
                    const p = document.createElement('p');
                    p.innerHTML = html;
                    div.appendChild(p);
                });
                const nav = document.createElement('div');
                nav.className = 'nav-btns';
                if (i > 0) nav.appendChild(navBtn('← Back', pageNum - 1));
                if (i < nA - 1) nav.appendChild(navBtn('Next →', pageNum + 1));
                else {
                    nav.appendChild(navFinish());
                }
                if (dbEditorEnabled() && nA > 1 && i >= ORIGINAL_CHAPTERS_PER_ROUTE)
                    nav.appendChild(navDeleteChapter(pageNum, 'A'));
                div.appendChild(nav);
                root.appendChild(div);
                pageNum++;
            });

            story.routeB.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'page';
                div.id = 'p' + pageNum;
                const h2 = document.createElement('h2');
                h2.textContent = ch.title;
                div.appendChild(h2);
                ch.paragraphs.forEach(html => {
                    const p = document.createElement('p');
                    p.innerHTML = html;
                    div.appendChild(p);
                });
                const nav = document.createElement('div');
                nav.className = 'nav-btns';
                if (i > 0) nav.appendChild(navBtn('← Back', pageNum - 1));
                if (i < nB - 1) nav.appendChild(navBtn('Next →', pageNum + 1));
                else {
                    nav.appendChild(navBtn('Next →', ourSongPage));
                }
                if (dbEditorEnabled() && nB > 1 && i >= ORIGINAL_CHAPTERS_PER_ROUTE)
                    nav.appendChild(navDeleteChapter(pageNum, 'B'));
                div.appendChild(nav);
                root.appendChild(div);
                pageNum++;
            });

            const os = story.ourSongChapter;
            const div = document.createElement('div');
            div.className = 'page';
            div.id = 'p' + ourSongPage;
            const h2 = document.createElement('h2');
            h2.textContent = os.title;
            div.appendChild(h2);
            os.paragraphs.forEach(html => {
                const p = document.createElement('p');
                p.innerHTML = html;
                div.appendChild(p);
            });

            const playerWrap = document.createElement('div');
            playerWrap.className = 'our-song-player';
            playerWrap.id = 'ourSongPlayerWrap';
            const audio = document.createElement('audio');
            audio.id = 'ourSongAudio';
            audio.preload = 'auto';
            const source = document.createElement('source');
            source.src = os.audioSrc || 'OURSONG.mp3';
            source.type = 'audio/mpeg';
            audio.appendChild(source);
            playerWrap.appendChild(audio);

            const ctr = document.createElement('div');
            ctr.className = 'our-song-controls';
            const playBtn = document.createElement('button');
            playBtn.type = 'button';
            playBtn.className = 'our-song-play';
            playBtn.id = 'ourSongPlayBtn';
            playBtn.setAttribute('aria-label', 'Play or pause');
            playBtn.textContent = '▶';
            const barWrap = document.createElement('div');
            barWrap.className = 'our-song-bar-wrap';
            const seek = document.createElement('input');
            seek.type = 'range';
            seek.className = 'our-song-seek';
            seek.id = 'ourSongSeek';
            seek.min = '0';
            seek.max = '1000';
            seek.value = '0';
            seek.setAttribute('aria-label', 'Seek');
            const times = document.createElement('div');
            times.className = 'our-song-times';
            const t0 = document.createElement('span');
            t0.id = 'ourSongTimeCur';
            t0.textContent = '0:00';
            const t1 = document.createElement('span');
            t1.id = 'ourSongTimeDur';
            t1.textContent = '--:--';
            times.appendChild(t0);
            times.appendChild(t1);
            barWrap.appendChild(seek);
            barWrap.appendChild(times);
            ctr.appendChild(playBtn);
            ctr.appendChild(barWrap);
            playerWrap.appendChild(ctr);
            div.appendChild(playerWrap);

            const nav = document.createElement('div');
            nav.className = 'nav-btns';
            nav.appendChild(navBtn('← Back', ourSongPage - 1));
            nav.appendChild(navFinish());
            nav.appendChild(navAddChapter('B'));
            div.appendChild(nav);
            root.appendChild(div);
        }

        function appendParaField(text) {
            const ta = document.createElement('textarea');
            ta.className = 'ce-para';
            ta.value = text;
            ta.placeholder = 'Write here…';
            document.getElementById('ce-paras').appendChild(ta);
        }

        function openChapterEditor(preferredRoute) {
            const modal = document.getElementById('chapter-editor-modal');
            document.getElementById('ce-route').value = preferredRoute === 'A' ? 'A' : 'B';
            document.getElementById('ce-title').value = '';
            document.getElementById('ce-paras').innerHTML = '';
            appendParaField('');
            const errEl = document.getElementById('ce-err');
            errEl.textContent = '';
            if (!dbEditorEnabled()) {
                errEl.textContent = 'To publish from the site: add your Supabase URL, anon key, and EDITOR_SAVE_TOKEN in index.html (see supabase/schema.sql).';
            }
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeChapterEditor() {
            const modal = document.getElementById('chapter-editor-modal');
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
        }

        /** Next chapter on this route: "07. Your title" (matches 01. … style per route). */
        function numberedTitleForNewChapter(routeLetter, titleRaw) {
            const key = routeLetter === 'A' ? 'routeA' : 'routeB';
            const n = storyData[key].length + 1;
            const prefix = String(n).padStart(2, '0') + '. ';
            const stripped = (titleRaw || 'New chapter').replace(/^\d{1,2}\.\s*/, '').trim() || 'New chapter';
            return prefix + stripped;
        }

        async function onSaveNewChapter() {
            const errEl = document.getElementById('ce-err');
            errEl.textContent = '';
            if (!dbEditorEnabled()) {
                errEl.textContent = 'Configure Supabase in index.html first.';
                return;
            }
            const route = document.getElementById('ce-route').value;
            const key = route === 'A' ? 'routeA' : 'routeB';
            const titleInput = document.getElementById('ce-title').value.trim() || 'New chapter';
            const title = numberedTitleForNewChapter(route, titleInput);
            const raw = [...document.querySelectorAll('#ce-paras .ce-para')].map(t => t.value.trim());
            const paragraphs = raw.some(Boolean) ? raw.filter(Boolean) : [''];
            const chapter = { title, paragraphs, userAdded: true };

            storyData[key].push(chapter);
            try {
                await persistStoryToSupabase();
            } catch (e) {
                storyData[key].pop();
                errEl.textContent = formatSaveError(e);
                return;
            }

            closeChapterEditor();
            const newPage = route === 'A'
                ? storyData.routeA.length
                : storyData.routeA.length + storyData.routeB.length;
            buildBook(storyData);
            initOurSongPlayer();
            tryDecodeOurSongDuration();
            nextPage(newPage);
        }

        async function deleteChapterAtPage(pageNum, routeKey) {
            if (!dbEditorEnabled()) {
                alert('Configure Supabase in index.html to delete chapters.');
                return;
            }
            const arr = routeKey === 'A' ? storyData.routeA : storyData.routeB;
            if (arr.length <= 1) {
                alert('There must be at least one chapter on this path.');
                return;
            }
            const idx = routeKey === 'A'
                ? pageNum - 1
                : pageNum - storyData.routeA.length - 1;
            if (idx < 0 || idx >= arr.length) return;
            if (idx < ORIGINAL_CHAPTERS_PER_ROUTE) {
                alert('Chapters 1–6 on this path are the original story and cannot be deleted.');
                return;
            }
            if (!confirm('Delete this chapter for everyone? This cannot be undone.')) return;

            const removed = arr[idx];
            arr.splice(idx, 1);
            try {
                await persistStoryToSupabase();
            } catch (e) {
                arr.splice(idx, 0, removed);
                alert(formatSaveError(e));
                return;
            }

            const goTo = Math.max(1, pageNum - 1);
            buildBook(storyData);
            initOurSongPlayer();
            tryDecodeOurSongDuration();
            nextPage(goTo);
        }

        function setupChapterEditorModal() {
            const modal = document.getElementById('chapter-editor-modal');
            const panel = modal.querySelector('.chapter-editor-panel');
            document.getElementById('ce-cancel').addEventListener('click', closeChapterEditor);
            modal.addEventListener('click', function (e) { if (e.target === modal) closeChapterEditor(); });
            panel.addEventListener('click', function (e) { e.stopPropagation(); });
            document.getElementById('ce-add-para').addEventListener('click', function () { appendParaField(''); });
            document.getElementById('ce-save').addEventListener('click', function () { onSaveNewChapter(); });
        }

        async function initStory() {
            const root = document.getElementById('book-pages-root');
            let story = await loadStoryFromSupabase();
            if (!story) {
                try {
                    const res = await fetch('data/chapters.json', { cache: 'no-store' });
                    if (res.ok) story = await res.json();
                } catch (e) { /* file:// or offline */ }
            }
            if (!story && root) {
                const fb = document.getElementById('chapters-fallback');
                if (fb && fb.textContent.trim()) {
                    try { story = JSON.parse(fb.textContent); } catch (e2) { /* invalid fallback */ }
                }
            }
            if (!story) {
                if (root) {
                    root.innerHTML = '<p style="color:#e0a1ad;padding:1.5rem;font-size:1rem;">Could not load the story. Use a local server, set up <b>data/chapters.json</b>, or the <b>chapters-fallback</b> block in <b>index.html</b>. To load from the cloud first, configure Supabase at the top of this file.</p>';
                }
                return;
            }
            storyData = JSON.parse(JSON.stringify(story));
            buildBook(storyData);
            initOurSongPlayer();
            tryDecodeOurSongDuration();
        }
        /** Real length of OURSONG.mp3 — file metadata wrongly reports ~22 min */
        const OUR_SONG_DISPLAY_DURATION_SEC = 3 * 60 + 20;
        /** Many broken/VBR MP3s report ~20–25 min; real track is shorter — don’t trust huge metadata. */
        const OUR_SONG_MAX_TRUST_METADATA_SEC = 15 * 60;

        function formatTime(s) {
            if (!isFinite(s) || s < 0) return '--:--';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function getReliableDuration(audio) {
            if (OUR_SONG_DISPLAY_DURATION_SEC > 0)
                return OUR_SONG_DISPLAY_DURATION_SEC;
            if (ourSongTrueDuration != null && isFinite(ourSongTrueDuration) && ourSongTrueDuration > 0)
                return ourSongTrueDuration;
            const meta = audio.duration;
            const metaSuspicious = isFinite(meta) && meta > OUR_SONG_MAX_TRUST_METADATA_SEC;
            const fullyLoaded = audio.readyState >= 4;
            let fromSeek = 0;
            if (audio.seekable && audio.seekable.length > 0)
                fromSeek = audio.seekable.end(audio.seekable.length - 1);
            let fromBuf = 0;
            if (audio.buffered && audio.buffered.length > 0)
                fromBuf = audio.buffered.end(audio.buffered.length - 1);
            const candidate = Math.max(
                isFinite(fromSeek) && fromSeek > 1 ? fromSeek : 0,
                isFinite(fromBuf) && fromBuf > 1 ? fromBuf : 0
            );
            if (metaSuspicious) {
                if (candidate > 10 && candidate < meta * 0.95)
                    return candidate;
                return 0;
            }
            if (candidate > 1 && isFinite(meta) && meta > candidate * 1.35 && fullyLoaded)
                return candidate;
            if (candidate > 1 && (!isFinite(meta) || meta <= 0))
                return candidate;
            if (isFinite(meta) && meta > 0 && meta < 86400)
                return meta;
            if (candidate > 1)
                return candidate;
            return 0;
        }

        async function tryDecodeOurSongDuration() {
            if (ourSongTrueDuration != null) return;
            const audio = document.getElementById('ourSongAudio');
            const srcEl = audio && audio.querySelector('source');
            let src = srcEl && srcEl.getAttribute('src');
            if (!audio || !src) return;
            if (!/^https?:/i.test(src) && !src.startsWith('/'))
                try { src = new URL(src, document.baseURI || window.location.href).href; } catch (e) { return; }
            try {
                const res = await fetch(src);
                if (!res.ok) return;
                const buf = await res.arrayBuffer();
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return;
                const ac = new AC();
                const decoded = await ac.decodeAudioData(buf.slice(0));
                if (decoded.duration > 0 && isFinite(decoded.duration)) {
                    ourSongTrueDuration = decoded.duration;
                    updateOurSongPlayerUI();
                }
                if (typeof ac.close === 'function') await ac.close();
            } catch (e) { /* file:// often blocks fetch — rely on buffered range + ended */ }
        }

        function updateOurSongPlayerUI() {
            const audio = document.getElementById('ourSongAudio');
            const seek = document.getElementById('ourSongSeek');
            const curEl = document.getElementById('ourSongTimeCur');
            const durEl = document.getElementById('ourSongTimeDur');
            const btn = document.getElementById('ourSongPlayBtn');
            if (!audio || !seek || !curEl || !durEl || !btn) return;
            const dur = getReliableDuration(audio);
            curEl.textContent = formatTime(audio.currentTime);
            durEl.textContent = dur > 0 ? formatTime(dur) : '--:--';
            if (!ourSongSeekPointerDown && dur > 0)
                seek.value = String(Math.min(1000, Math.round((audio.currentTime / dur) * 1000)));
            btn.textContent = audio.paused ? '▶' : '⏸';
        }

        function initOurSongPlayer() {
            if (ourSongPlayerInited) return;
            const audio = document.getElementById('ourSongAudio');
            const seek = document.getElementById('ourSongSeek');
            const btn = document.getElementById('ourSongPlayBtn');
            if (!audio || !seek || !btn) return;
            ourSongPlayerInited = true;

            const refresh = () => updateOurSongPlayerUI();
            ['timeupdate', 'loadedmetadata', 'durationchange', 'progress', 'canplay', 'canplaythrough', 'play', 'pause'].forEach(ev =>
                audio.addEventListener(ev, refresh));
            audio.addEventListener('ended', () => {
                const t = audio.currentTime;
                if (isFinite(t) && t > 1) ourSongTrueDuration = t;
                refresh();
            });

            btn.addEventListener('click', () => {
                if (audio.paused) audio.play().catch(() => {});
                else audio.pause();
            });

            seek.addEventListener('pointerdown', () => { ourSongSeekPointerDown = true; });
            seek.addEventListener('pointerup', () => { ourSongSeekPointerDown = false; refresh(); });
            seek.addEventListener('pointercancel', () => { ourSongSeekPointerDown = false; refresh(); });
            const applySeek = () => {
                const dur = getReliableDuration(audio);
                if (dur > 0) audio.currentTime = (Number(seek.value) / 1000) * dur;
            };
            seek.addEventListener('change', applySeek);
            seek.addEventListener('input', () => {
                const dur = getReliableDuration(audio);
                const curEl = document.getElementById('ourSongTimeCur');
                if (dur > 0 && curEl) curEl.textContent = formatTime((Number(seek.value) / 1000) * dur);
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            setupChapterEditorModal();
            initStory();
        });

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Drop {
            constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.speed = Math.random() * 2 + 2; this.len = Math.random() * 15 + 10; }
            fall() { this.y += this.speed; if (this.y > height) { this.y = -20; this.x = Math.random() * width; }
                ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.len); ctx.strokeStyle = 'rgba(224, 161, 173, 0.2)'; ctx.stroke(); }
        }
        for (let i = 0; i < 75; i++) raindrops.push(new Drop());
        function animate() { ctx.clearRect(0, 0, width, height); raindrops.forEach(d => d.fall()); requestAnimationFrame(animate); }

        function startExperience() {
            document.getElementById('cover').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cover').style.display = 'none';
                const sel = document.getElementById('selection-container');
                sel.style.display = 'block'; setTimeout(() => sel.style.opacity = '1', 50);
                document.getElementById('rainCanvas').style.opacity = '1'; animate();
            }, 1000);
        }

        function startRoute(route) {
            document.getElementById('selection-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('selection-container').style.display = 'none';
                const book = document.getElementById('book-container');
                book.style.display = 'block'; setTimeout(() => book.style.opacity = '1', 50);
                storyRoute = route;
                if(route === 'A') {
                    const pageEl = document.getElementById('p1');
                    if (!pageEl) return;
                    const a = document.getElementById("myAudio"); a.volume = 0.05; a.play().catch(() => {});
                    pageEl.classList.add('active-page');
                } else {
                    const pid = STORY_META.firstB;
                    const pageEl = pid > 0 ? document.getElementById('p' + pid) : null;
                    if (!pageEl) return;
                    const b = document.getElementById("routeBAudio"); b.volume = 0.15; b.play().catch(() => {});
                    pageEl.classList.add('active-page');
                }
            }, 800);
        }

        function nextPage(num) {
            const target = document.getElementById('p' + num);
            if (!target) return;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            target.classList.add('active-page');

            const routeB = document.getElementById('routeBAudio');
            const ourSong = document.getElementById('ourSongAudio');
            const routeBChapterPages = num >= STORY_META.firstB && num <= STORY_META.lastBText;
            if (num === STORY_META.ourSongPage && ourSong) {
                if (routeB) routeB.pause();
                ourSong.volume = 1;
                initOurSongPlayer();
                tryDecodeOurSongDuration();
                updateOurSongPlayerUI();
                ourSong.play().catch(() => {});
            } else {
                if (ourSong) {
                    ourSong.pause();
                    ourSong.currentTime = 0;
                    updateOurSongPlayerUI();
                }
                if (routeBChapterPages && routeB) {
                    routeB.play().catch(() => {});
                }
            }
        }

        function showFinalScene() {
            const ourSong = document.getElementById('ourSongAudio');
            if (ourSong) { ourSong.pause(); ourSong.currentTime = 0; }
            const routeB = document.getElementById('routeBAudio');
            if (storyRoute === 'B') {
                routeB.volume = 0.15;
                routeB.play().catch(() => {});
            } else {
                routeB.pause();
            }
            document.getElementById('book-container').style.opacity = '0';
            document.getElementById('finalScene').style.opacity = '1';
            setTimeout(() => {
                document.getElementById('book-container').style.display = 'none';
                document.getElementById('ekg').style.opacity = '1';
                document.getElementById('homeBtn').style.opacity = '1';
            }, 1500);
        }
    </script>
